<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>신현일의 이모저모 검색엔진</title>
    
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #202124;
            --link-color: #4285F4;
            --input-border: #dfe1e5;
            --btn-bg: #f8f9fa;
            --switch-bg: #e5e5e5;
            --icon-color: #9aa0a6;
        }

        [data-theme="dark"] {
            --bg-color: #181818;
            --text-color: #f1f3f4;
            --link-color: #8ab4f8;
            --input-border: #3c4043;
            --btn-bg: #303134;
            --switch-bg: #444;
            --icon-color: #9aa0a6;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s, color 0.4s;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            justify-content: flex-start;
            padding-top: 20vh;
            box-sizing: border-box;
        }

        .top-left-controls {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 1000;
        }

        .theme-switch {
            display: inline-block;
            width: 55px;
            height: 30px;
            position: relative;
        }

        .theme-switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--switch-bg);
            border-radius: 30px;
            transition: 0.4s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .slider:before {
            position: absolute;
            content: "☀️";
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 4px;
            background-color: #87CEEB;
            border-radius: 50%;
            transition: 0.4s;
        }

        input:checked + .slider:before {
            transform: translateX(25px);
            content: "🌙";
            background-color: #000080;
            color: white;
        }

        .live-link {
            margin-bottom: 25px;
            color: var(--link-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
        }

        .search-container {
            text-align: center;
            width: 100%;
            max-width: 580px;
            padding: 0 24px; /* 모바일 대응 양옆 여백 확보 */
            box-sizing: border-box;
        }

        .logo {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 35px;
            letter-spacing: -1.5px;
        }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #34A853; }
        .logo span:nth-child(5) { color: var(--text-color); font-size: 2.5rem; margin-left: 5px; }

        .search-box-wrapper {
            position: relative;
            width: 100%;
            height: 48px;
            margin-bottom: 30px;
            background-color: var(--bg-color);
            border: 1px solid var(--input-border);
            border-radius: 24px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.1);
            transition: box-shadow 0.2s;
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }

        .search-box-wrapper:focus-within {
            box-shadow: 0 1px 8px rgba(32,33,36,0.2);
        }

        .search-icon-left {
            position: absolute;
            left: 18px;
            font-size: 18px;
            color: var(--icon-color);
            pointer-events: none;
            top: 50%;
            transform: translateY(calc(-50% - 2px));
        }

        .camera-icon-right {
            position: absolute;
            right: 18px;
            font-size: 20px;
            text-decoration: none;
            cursor: pointer;
            top: 50%;
            transform: translateY(calc(-50% - 2px));
            transition: transform 0.2s;
        }
        
        .camera-icon-right:hover { 
            transform: translateY(calc(-50% - 2px)) scale(1.15); 
        }

        .search-box-wrapper input {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            color: var(--text-color);
            padding: 0 50px 0 45px;
            box-sizing: border-box;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn {
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-bg);
            border-radius: 4px;
            color: var(--text-color);
            font-size: 14px;
            padding: 0 16px;
            line-height: 36px;
            height: 36px;
            min-width: 54px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            border: 1px solid #dadce0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        /* 모바일 반응형 미세 스케일 조정 */
        @media (max-width: 600px) {
            body { padding-top: 15vh; }
            .logo { font-size: 2.3rem; margin-bottom: 25px; }
            .logo span:nth-child(5) { font-size: 1.8rem; }
            .search-box-wrapper { height: 46px; }
        }
    </style>
</head>
<body>
    <div class="top-left-controls">
        <label class="theme-switch">
            <input type="checkbox" id="theme-checkbox">
            <div class="slider"></div>
        </label>
    </div>

    <a href="Untitled-2.html" class="live-link">신현일의 라이브 직캠을 지금 보세요!!</a>

    <div class="search-container">
        <div class="logo">
            <span>신</span><span>현</span><span>일</span><span>의</span><span>Search</span>
        </div>
        
        <form action="https://www.google.com/search" method="GET">
            <div class="search-box-wrapper">
                <span class="search-icon-left">🔍</span>
                <input type="text" id="search-input" name="q" placeholder="무엇이든 검색해보세요..." autofocus>
                <a href="hand_tracking.html" class="camera-icon-right" title="손 인식 카메라">📷</a>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn">Vibe 검색</button>
                <button type="button" class="btn" id="feeling-btn">Feeling Good!</button>
            </div>
        </form>
    </div>

    <script>
        const themeCheckbox = document.getElementById('theme-checkbox');
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeCheckbox.checked = (savedTheme === 'dark');

        themeCheckbox.addEventListener('change', (e) => {
            const theme = e.target.checked ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });

        const feelingBtn = document.getElementById('feeling-btn');
        const searchInput = document.getElementById('search-input');

        feelingBtn.addEventListener('click', () => {
            if (searchInput.value.trim().toLowerCase() === 'hyunil gravity') {
                window.location.href = 'gravity.html'; 
            } else {
                alert('오늘 하루도 기분 좋은 하루 되세요! 😍');
            }
        });
    </script>
</body>
</html>
